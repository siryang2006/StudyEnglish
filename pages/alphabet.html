<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母乐园 - KidsEnglish Fun</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/games.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <style>
        .alphabet-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .letter-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .letter-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .big-letter {
            font-size: 180px;
            font-weight: bold;
            text-shadow: 5px 5px 10px rgba(0,0,0,0.3);
            animation: bounceIn 1s ease-out;
            position: relative;
            z-index: 1;
        }
        
        .letter-info {
            position: relative;
            z-index: 1;
        }
        
        .letter-word {
            font-size: 48px;
            margin: 20px 0;
            animation: slideInLeft 0.5s ease-out;
        }
        
        .letter-image {
            font-size: 120px;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }
        
        .letter-phonetic {
            font-size: 24px;
            opacity: 0.9;
            font-family: 'Times New Roman', serif;
        }
        
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        
        .letter-btn {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 15px;
            background: white;
            font-size: 36px;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }
        
        .letter-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            background: var(--primary-color);
            color: white;
        }
        
        .letter-btn.active {
            background: var(--primary-color);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }
        
        .letter-btn.completed::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 16px;
            color: var(--success-color);
        }
        
        .letter-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-speak {
            background: var(--success-color);
            color: white;
        }
        
        .btn-prev, .btn-next {
            background: var(--primary-color);
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .writing-animation {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .writing-canvas {
            width: 300px;
            height: 300px;
            border: 3px dashed var(--primary-color);
            border-radius: 15px;
            margin: 20px auto;
            cursor: crosshair;
            background: #f9f9f9;
        }
        
        @media (max-width: 768px) {
            .big-letter {
                font-size: 120px;
            }
            
            .letter-word {
                font-size: 36px;
            }
            
            .letter-image {
                font-size: 80px;
            }
            
            .letter-grid {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            }
            
            .letter-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">🔤</span>
                <h1>字母乐园</h1>
            </div>
            <div class="user-info">
                <div class="stars">
                    <span class="star-icon">⭐</span>
                    <span id="starCount">0</span>
                </div>
            </div>
        </header>

        <main class="main-content alphabet-container">
            <button class="back-btn" onclick="navigateTo('../index.html')">
                ← 返回首页
            </button>

            <!-- 当前字母大展示 -->
            <div class="letter-display" id="letterDisplay">
                <div class="big-letter" id="bigLetter">A</div>
                <div class="letter-info">
                    <div class="letter-image" id="letterImage">🍎</div>
                    <div class="letter-word" id="letterWord">Apple</div>
                    <div class="letter-phonetic" id="letterPhonetic">/æ/</div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="letter-actions">
                <button class="action-btn btn-prev" onclick="prevLetter()">← 上一个</button>
                <button class="action-btn btn-speak" onclick="speakLetter()">🔊 听发音</button>
                <button class="action-btn btn-next" onclick="nextLetter()">下一个 →</button>
            </div>

            <!-- 字母网格 -->
            <div class="letter-grid" id="letterGrid">
                <!-- 动态生成 -->
            </div>

            <!-- 书写练习 -->
            <div class="writing-animation">
                <h3 style="color: var(--text-dark); margin-bottom: 15px;">✏️ 书写练习</h3>
                <p style="color: var(--text-light); margin-bottom: 15px;">点击按钮，观看字母书写动画</p>
                <button class="tab-btn" onclick="playWritingAnimation()">播放书写动画</button>
                <div class="writing-canvas" id="writingCanvas">
                    <div style="font-size: 48px; line-height: 300px;" id="writingLetter">A</div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let currentLetterIndex = 0;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderLetterGrid();
            loadLetter();
            updateStarDisplay();
        });

        // 渲染字母网格
        function renderLetterGrid() {
            const grid = document.getElementById('letterGrid');
            if (!grid) return;

            alphabetData.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn ripple';
                btn.textContent = item.letter;
                btn.onclick = () => {
                    currentLetterIndex = index;
                    loadLetter();
                };
                grid.appendChild(btn);
            });
        }

        // 加载字母
        function loadLetter() {
            const letterData = alphabetData[currentLetterIndex];
            
            document.getElementById('bigLetter').textContent = letterData.letter;
            document.getElementById('letterImage').textContent = letterData.image;
            document.getElementById('letterWord').textContent = letterData.word;
            document.getElementById('letterPhonetic').textContent = letterData.phonetic;
            document.getElementById('writingLetter').textContent = letterData.letter;

            // 更新按钮状态
            document.querySelectorAll('.letter-btn').forEach((btn, index) => {
                btn.classList.toggle('active', index === currentLetterIndex);
                btn.classList.toggle('completed', storage.data.completedLetters.includes(letterData.letter));
            });

            // 自动播放发音
            setTimeout(() => speakLetter(), 300);
        }

        // 播放字母发音
        function speakLetter() {
            const letterData = alphabetData[currentLetterIndex];
            audioManager.speakLetter(letterData.letter);
            audioManager.playClickSound();
        }

        // 上一个字母
        function prevLetter() {
            currentLetterIndex = (currentLetterIndex - 1 + alphabetData.length) % alphabetData.length;
            loadLetter();
        }

        // 下一个字母
        function nextLetter() {
            const letterData = alphabetData[currentLetterIndex];
            storage.completeLetter(letterData.letter);
            
            currentLetterIndex = (currentLetterIndex + 1) % alphabetData.length;
            loadLetter();
            
            storage.addStars(5);
            updateStarDisplay();
        }

        // 播放书写动画
        function playWritingAnimation() {
            const canvas = document.getElementById('writingCanvas');
            const letter = document.getElementById('writingLetter');
            
            letter.style.animation = 'none';
            setTimeout(() => {
                letter.style.animation = 'bounceIn 0.6s ease-out';
            }, 10);
            
            audioManager.speakLetter(alphabetData[currentLetterIndex].letter);
        }

        // 更新星星显示
        function updateStarDisplay() {
            const starCount = document.getElementById('starCount');
            if (starCount && storage) {
                starCount.textContent = storage.data.stars;
            }
        }
    </script>
</body>
</html>
