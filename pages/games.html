<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动游戏 - KidsEnglish Fun</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/games.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <style>
        .games-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .game-intro {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        
        .game-icon {
            font-size: 72px;
            margin-bottom: 20px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        
        /* 气球游戏样式 */
        .balloon-game {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }
        
        .balloon-game.active {
            display: block;
            animation: slideInRight 0.5s ease-out;
        }
        
        .balloon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg-light);
        }
        
        .balloon-score, .balloon-timer {
            font-size: 24px;
            font-weight: bold;
        }
        
        .balloon-score { color: var(--primary-color); }
        .balloon-timer { color: var(--secondary-color); }
        
        .target-word {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-dark);
            margin: 20px 0;
            padding: 15px;
            background: var(--bg-light);
            border-radius: 10px;
        }
        
        .balloons-container {
            position: relative;
            height: 500px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .balloon {
            position: absolute;
            width: 70px;
            height: 90px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            animation: balloonFloat 4s ease-in-out infinite;
            user-select: none;
            transition: transform 0.2s ease;
        }
        
        @keyframes balloonFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            75% { transform: translateY(20px) rotate(-5deg); }
        }
        
        .balloon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 70%);
            z-index: 1;
        }
        
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 25px;
            background: #666;
        }
        
        .balloon:hover {
            transform: scale(1.15);
            filter: brightness(1.1);
        }
        
        /* 爆炸效果 */
        .explosion-flash {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,255,0,0.6), transparent);
            pointer-events: none;
            z-index: 99;
            animation: flashExpand 0.4s ease-out forwards;
        }
        
        @keyframes flashExpand {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .explosion-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            animation: particleFly 0.8s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        .debris {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            pointer-events: none;
            z-index: 98;
            animation: debrisFly 1s ease-out forwards;
        }
        
        @keyframes debrisFly {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(720deg); opacity: 0; }
        }
        
        .star-burst {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            z-index: 101;
            animation: starFly 0.8s ease-out forwards;
        }
        
        @keyframes starFly {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); opacity: 0; }
        }
        
        .score-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #FFD93D;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 102;
            animation: scoreFloat 1s ease-out forwards;
        }
        
        @keyframes scoreFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }
        
        .balloon.popping {
            animation: balloonPop 0.4s ease-out forwards;
        }
        
        @keyframes balloonPop {
            0% { transform: scale(1); opacity: 1; }
            15% { transform: scale(1.4); opacity: 0.9; }
            30% { transform: scale(0.8); opacity: 0.7; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 0.5; }
            100% { transform: scale(0) rotate(30deg); opacity: 0; }
        }
        
        .back-btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">🎮</span>
                <h1>互动游戏</h1>
            </div>
            <div class="user-info">
                <div class="stars">
                    <span class="star-icon">⭐</span>
                    <span id="starCount">0</span>
                </div>
            </div>
        </header>

        <main class="main-content games-container">
            <button class="back-btn" onclick="navigateTo('../index.html')">← 返回首页</button>

            <!-- 游戏列表 -->
            <div id="gamesList">
                <div class="game-intro">
                    <h2>🎮 选择游戏开始挑战！</h2>
                    <p>每个游戏都设计了丰富的互动元素，让学习更有趣！</p>
                </div>
                
                <!-- 难度选择 -->
                <div class="difficulty-selector">
                    <button class="diff-btn active" data-level="easy" onclick="setDifficulty('easy', this)">简单</button>
                    <button class="diff-btn" data-level="medium" onclick="setDifficulty('medium', this)">中等</button>
                    <button class="diff-btn" data-level="hard" onclick="setDifficulty('hard', this)">困难</button>
                </div>
                
                <div class="games-grid" id="gamesGrid"></div>
            </div>

            <!-- 气球单词游戏 -->
            <div class="balloon-game" id="balloonGame">
                <div class="balloon-header">
                    <h3>🎈 气球单词</h3>
                    <div>
                        <span class="balloon-score">分数: <span id="balloonScore">0</span></span>
                        <span class="balloon-timer" style="margin-left: 20px;">时间: <span id="balloonTimer">60</span>s</span>
                    </div>
                </div>
                <div class="target-word">
                    点击正确的单词气球！目标：<span id="balloonTarget">cat</span>
                </div>
                <div class="balloons-container" id="balloonsContainer"></div>
                <button class="back-to-games tab-btn" onclick="showGamesList()">返回游戏列表</button>
            </div>

            <!-- 拼图单词游戏 -->
            <div class="puzzle-game" id="puzzleGame" style="display: none;">
                <div class="game-header">
                    <h3>🧩 拼图单词</h3>
                    <div class="puzzle-score">分数: <span id="puzzleScore">0</span></div>
                </div>
                <div class="puzzle-target" id="puzzleTarget"></div>
                <div class="puzzle-letters" id="puzzleLetters"></div>
                <div class="puzzle-answer" id="puzzleAnswer"></div>
                <div class="puzzle-hint" id="puzzleHint"></div>
                <button class="back-to-games tab-btn" onclick="showGamesList()">返回游戏列表</button>
            </div>

            <!-- 听力选择游戏 -->
            <div class="listen-game" id="listenGame" style="display: none;">
                <div class="game-header">
                    <h3>👂 听力选择</h3>
                    <div class="listen-score">分数: <span id="listenScore">0</span></div>
                </div>
                <button class="listen-play-btn" id="listenPlayBtn" onclick="playListenWord()">🔊 播放发音</button>
                <div class="listen-options" id="listenOptions"></div>
                <div class="listen-feedback" id="listenFeedback"></div>
                <button class="back-to-games tab-btn" onclick="showGamesList()">返回游戏列表</button>
            </div>

            <!-- 单词消消乐游戏 -->
            <div class="match-game" id="matchGame" style="display: none;">
                <div class="game-header">
                    <h3>✨ 单词消消乐</h3>
                    <div class="match-score">分数: <span id="matchScore">0</span></div>
                </div>
                <div class="match-grid" id="matchGrid"></div>
                <div class="match-feedback" id="matchFeedback"></div>
                <button class="back-to-games tab-btn" onclick="showGamesList()">返回游戏列表</button>
            </div>

            <!-- 句子组合游戏 -->
            <div class="sentence-game" id="sentenceGame" style="display: none;">
                <div class="game-header">
                    <h3>📝 句子组合</h3>
                    <div class="sentence-score">分数: <span id="sentenceScore">0</span></div>
                </div>
                <div class="sentence-target" id="sentenceTarget"></div>
                <div class="sentence-words" id="sentenceWords"></div>
                <div class="sentence-answer" id="sentenceAnswer"></div>
                <div class="sentence-hint" id="sentenceHint"></div>
                <button class="back-to-games tab-btn" onclick="showGamesList()">返回游戏列表</button>
            </div>

            <!-- 跟读练习游戏 -->
            <div class="read-game" id="readGame" style="display: none;">
                <div class="game-header">
                    <h3>🎤 跟读练习</h3>
                    <div class="read-score">分数: <span id="readScore">0</span></div>
                </div>
                <div class="read-sentence" id="readSentence"></div>
                <button class="read-record-btn" id="readRecordBtn" onclick="startRecording()">🎙 开始跟读</button>
                <div class="read-feedback" id="readFeedback"></div>
                <button class="back-to-games tab-btn" onclick="showGamesList()">返回游戏列表</button>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/celebration.js"></script>
    <script src="../js/app.js"></script>
    <script>
        // ========== 气球游戏 ==========
        let balloonScore = 0;
        let balloonTimer = 60;
        let balloonInterval = null;
        let currentTarget = '';
        let isBalloonActive = false;

        const games = [
            { name: '气球单词', icon: '🎈', desc: '点击正确单词气球', difficulty: 2, badge: 'HOT', id: 'balloon' },
            { name: '拼图单词', icon: '🧩', desc: '拖动字母拼单词', difficulty: 2, badge: null, id: 'puzzle' },
            { name: '听力选择', icon: '👂', desc: '听发音选单词', difficulty: 3, badge: null, id: 'listen' },
            { name: '单词消消乐', icon: '✨', desc: '匹配单词和图片', difficulty: 3, badge: 'NEW', id: 'match' },
            { name: '句子组合', icon: '📝', desc: '拖拽单词组句子', difficulty: 3, badge: 'HOT', id: 'sentence' },
            { name: '跟读练习', icon: '🎤', desc: '跟读练习评分', difficulty: 2, badge: null, id: 'read' },
            { name: '单词书', icon: '📖', desc: '查询所有单词', difficulty: 1, badge: 'NEW', id: 'wordbook' },
            { name: '字母书写', icon: '✏️', desc: '练习写字母', difficulty: 2, badge: null, id: 'tracing' }
        ];

        let currentDifficulty = 'easy';

        function setDifficulty(level, btn) {
            currentDifficulty = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGames();
        }

        // 初始化游戏列表
        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            if (!grid) return;
            grid.innerHTML = '';
            
            games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card ripple';
                card.style.animationDelay = `${index * 0.1}s`;
                
                const difficultyDots = Array(3).fill(0).map((_, i) => 
                    `<div class="difficulty-dot ${i < game.difficulty ? 'active' : ''}"></div>`
                ).join('');

                card.innerHTML = `
                    ${game.badge ? `<div class="game-badge ${game.badge === 'HOT' ? 'hot' : ''}">${game.badge}</div>` : ''}
                    <div class="game-icon">${game.icon}</div>
                    <h3>${game.name}</h3>
                    <p>${game.desc}</p>
                    <div class="game-difficulty">${difficultyDots}</div>
                `;

                card.onclick = () => startGame(game.id);
                grid.appendChild(card);
            });
        }

        function startGame(gameId) {
            document.getElementById('gamesList').style.display = 'none';
            document.querySelectorAll('.balloon-game, .listen-game, .match-game, .puzzle-game, .read-game, .sentence-game').forEach(g => {
                g.style.display = 'none';
                g.classList.remove('active');
            });

            if (gameId === 'balloon') {
                document.getElementById('balloonGame').style.display = 'block';
                document.getElementById('balloonGame').classList.add('active');
                initBalloonGame();
            } else if (gameId === 'puzzle') {
                document.getElementById('puzzleGame').style.display = 'block';
                document.getElementById('puzzleGame').classList.add('active');
                initPuzzleGame();
            } else if (gameId === 'listen') {
                document.getElementById('listenGame').style.display = 'block';
                document.getElementById('listenGame').classList.add('active');
                initListenGame();
            } else if (gameId === 'match') {
                document.getElementById('matchGame').style.display = 'block';
                document.getElementById('matchGame').classList.add('active');
                initMatchGame();
            } else if (gameId === 'wordbook') {
                window.location.href = 'wordbook.html';
            } else if (gameId === 'tracing') {
                window.location.href = 'letter-tracing.html';
            } else if (gameId === 'sentence') {
                document.getElementById('sentenceGame').style.display = 'block';
                document.getElementById('sentenceGame').classList.add('active');
                initSentenceGame();
            } else if (gameId === 'read') {
                document.getElementById('readGame').style.display = 'block';
                document.getElementById('readGame').classList.add('active');
                initReadGame();
            }
        }

        function showGamesList() {
            document.getElementById('gamesList').style.display = 'block';
            document.querySelectorAll('.balloon-game, .puzzle-game, .listen-game, .match-game, .read-game, .sentence-game').forEach(g => {
                g.style.display = 'none';
                g.classList.remove('active');
            });
            stopBalloonGame();
        }

// ========== 气球游戏逻辑 ==========
function initBalloonGame() {
            // 根据难度调整时间
            const timeMap = { easy: 90, medium: 60, hard: 40 };
            balloonScore = 0;
            balloonTimer = timeMap[currentDifficulty] || 60;
            isBalloonActive = true;
            
            document.getElementById('balloonScore').textContent = 0;
            document.getElementById('balloonTimer').textContent = balloonTimer;
            
            generateBalloons();
            startBalloonTimer();
        }

        function generateBalloons() {
            const container = document.getElementById('balloonsContainer');
            if (!container || !isBalloonActive) return;
            
            container.innerHTML = '';
            
            const words = ['cat', 'dog', 'bird', 'fish', 'book', 'ball', 'tree', 'sun', 'moon', 'star'];
            currentTarget = words[Math.floor(Math.random() * words.length)];
            
            document.getElementById('balloonTarget').textContent = currentTarget;
            
            // 创建1个正确答案 + 7个干扰项
            const allWords = [currentTarget];
            while (allWords.length < 8) {
                const random = words[Math.floor(Math.random() * words.length)];
                if (!allWords.includes(random)) {
                    allWords.push(random);
                }
            }
            
            // 打乱顺序
            allWords.sort(() => Math.random() - 0.5);
            
            // 创建气球
            allWords.forEach((word, index) => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = word;
                balloon.style.left = `${5 + (index * 11.5)}%`;
                balloon.style.top = `${10 + Math.random() * 60}%`;
                balloon.style.background = getRandomGradient();
                balloon.style.animationDelay = `${index * 0.2}s`;
                
                balloon.onclick = (e) => {
                    e.stopPropagation();
                    popBalloon(balloon, word);
                };
                
                container.appendChild(balloon);
            });
        }

        function popBalloon(balloon, word) {
            if (!isBalloonActive || balloon.classList.contains('popping')) return;
            
            const rect = balloon.getBoundingClientRect();
            const containerRect = document.getElementById('balloonsContainer').getBoundingClientRect();
            const x = rect.left - containerRect.left + rect.width / 2;
            const y = rect.top - containerRect.top + rect.height / 2;
            
            balloon.classList.add('popping');
            
            if (word === currentTarget) {
                createExplosion(x, y, balloon.style.background);
                balloonScore += 10;
                document.getElementById('balloonScore').textContent = balloonScore;
                
                if (window.audioManager) window.audioManager.playSuccessSound();
                
                setTimeout(() => {
                    if (balloon.parentNode) balloon.remove();
                    if (isBalloonActive) generateBalloons();
                }, 500);
            } else {
                balloon.classList.add('shake');
                if (window.audioManager) window.audioManager.playErrorSound();
                setTimeout(() => {
                    balloon.classList.remove('shake');
                    balloon.classList.remove('popping');
                }, 500);
            }
        }

        function createExplosion(x, y, color) {
            const container = document.getElementById('balloonsContainer');
            
            // 闪光
            const flash = document.createElement('div');
            flash.className = 'explosion-flash';
            flash.style.left = `${x - 50}px`;
            flash.style.top = `${y - 50}px`;
            container.appendChild(flash);
            setTimeout(() => flash.remove(), 400);
            
            // 粒子
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'explosion-particle';
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.background = getRandomColor();
                
                const angle = (Math.PI * 2 * i) / 20;
                const distance = 50 + Math.random() * 100;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                particle.style.animationDelay = `${Math.random() * 0.2}s`;
                
                container.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }
            
            // 星星
            const stars = ['⭐', '🌟', '✨', '💫', '⭐'];
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.className = 'star-burst';
                star.textContent = stars[i % stars.length];
                star.style.left = `${x}px`;
                star.style.top = `${y}px`;
                
                const angle = (Math.PI * 2 * i) / 5;
                const distance = 60 + Math.random() * 60;
                star.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                star.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                star.style.animationDelay = `${Math.random() * 0.2}s`;
                
                container.appendChild(star);
                setTimeout(() => star.remove(), 800);
            }
            
            // 得分弹出
            const scorePop = document.createElement('div');
            scorePop.className = 'score-popup';
            scorePop.textContent = '+10 ⭐';
            scorePop.style.left = `${x - 30}px`;
            scorePop.style.top = `${y - 20}px`;
            container.appendChild(scorePop);
            setTimeout(() => scorePop.remove(), 1000);
        }

        function startBalloonTimer() {
            if (balloonInterval) clearInterval(balloonInterval);
            
            balloonInterval = setInterval(() => {
                if (!isBalloonActive) {
                    clearInterval(balloonInterval);
                    return;
                }
                
                balloonTimer--;
                document.getElementById('balloonTimer').textContent = balloonTimer;
                
                if (balloonTimer <= 0) {
                    stopBalloonGame();
                    alert(`游戏结束！你的得分是：${balloonScore}`);
                    if (window.storage) {
                        window.storage.addStars(Math.floor(balloonScore / 10));
                    }
                }
            }, 1000);
        }

        function stopBalloonGame() {
            isBalloonActive = false;
            if (balloonInterval) {
                clearInterval(balloonInterval);
                balloonInterval = null;
            }
        }

        function getRandomGradient() {
            const gradients = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
            ];
            return gradients[Math.floor(Math.random() * gradients.length)];
        }

        function getRandomColor() {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96E6A1', '#DDA0DD', '#FFD93D'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // ========= 拼图单词游戏 =========
        let puzzleScore = 0;
        let currentPuzzle = null;
        let puzzleAnswer = [];
        let puzzleWords = [];

        function initPuzzleGame() {
            // 根据难度调整单词长度
            const wordMap = {
                easy: ['cat', 'dog', 'fish', 'bird', 'star'],
                medium: ['apple', 'happy', 'table', 'water', 'music'],
                hard: ['elephant', 'birthday', 'monkey', 'teacher', 'school']
            };
            puzzleWords = wordMap[currentDifficulty] || wordMap.easy;

            puzzleScore = 0;
            document.getElementById('puzzleScore').textContent = 0;
            loadPuzzle();
        }

        function loadPuzzle() {
            currentPuzzle = puzzleWords[Math.floor(Math.random() * puzzleWords.length)];
            document.getElementById('puzzleTarget').textContent = `拼出单词：${currentPuzzle}`;
            document.getElementById('puzzleHint').textContent = `提示：${currentPuzzle.length}个字母`;

            // 打乱字母
            const letters = currentPuzzle.split('').sort(() => Math.random() - 0.5);
            const container = document.getElementById('puzzleLetters');
            container.innerHTML = '';

            letters.forEach((letter, index) => {
                const btn = document.createElement('button');
                btn.className = 'puzzle-letter';
                btn.textContent = letter.toUpperCase();
                btn.onclick = () => selectPuzzleLetter(letter, btn);
                container.appendChild(btn);
            });

            puzzleAnswer = [];
            document.getElementById('puzzleAnswer').innerHTML = '';
        }

        function selectPuzzleLetter(letter, btn) {
            puzzleAnswer.push(letter);
            btn.disabled = true;
            btn.style.opacity = '0.5';

            const answerDiv = document.getElementById('puzzleAnswer');
            const span = document.createElement('span');
            span.className = 'puzzle-answer-letter';
            span.textContent = letter.toUpperCase();
            answerDiv.appendChild(span);

            if (puzzleAnswer.length === currentPuzzle.length) {
                checkPuzzleAnswer();
            }
        }

        function checkPuzzleAnswer() {
            const userWord = puzzleAnswer.join('');
            if (userWord === currentPuzzle) {
                puzzleScore += 15;
                document.getElementById('puzzleScore').textContent = puzzleScore;
                if (window.audioManager) window.audioManager.playSuccessSound();
                if (window.celebration) window.celebration.simpleSuccess(window.innerWidth/2, window.innerHeight/2);
                setTimeout(() => {
                    alert('太棒了！正确！');
                    loadPuzzle();
                }, 500);
            } else {
                if (window.audioManager) window.audioManager.playErrorSound();
                alert('不对哦，再试试！');
                resetPuzzle();
            }
        }

        function resetPuzzle() {
            puzzleAnswer = [];
            document.getElementById('puzzleAnswer').innerHTML = '';
            document.querySelectorAll('.puzzle-letter').forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
            });
        }

        // ========= 听力选择游戏 =========
        let listenScore = 0;
        let currentListenWord = '';
        let listenWords = [];

        function initListenGame() {
            // 根据难度调整选项数量
            const wordMap = {
                easy: [
                    { word: 'cat', options: ['cat', 'bat', 'hat'] },
                    { word: 'dog', options: ['dog', 'log', 'fog'] },
                    { word: 'fish', options: ['fish', 'dish', 'wish'] }
                ],
                medium: [
                    { word: 'cat', options: ['cat', 'bat', 'hat', 'mat'] },
                    { word: 'dog', options: ['dog', 'log', 'fog', 'frog'] },
                    { word: 'bird', options: ['bird', 'word', 'third', 'heard'] },
                    { word: 'fish', options: ['fish', 'dish', 'wish', 'swish'] }
                ],
                hard: [
                    { word: 'cat', options: ['cat', 'bat', 'hat', 'mat', 'rat'] },
                    { word: 'dog', options: ['dog', 'log', 'fog', 'frog', 'hog'] },
                    { word: 'bird', options: ['bird', 'word', 'third', 'heard', 'herd'] },
                    { word: 'elephant', options: ['elephant', 'tiger', 'lion', 'monkey', 'bear'] }
                ]
            };
            listenWords = wordMap[currentDifficulty] || wordMap.easy;

            listenScore = 0;
            document.getElementById('listenScore').textContent = 0;
            loadListenQuestion();
        }

        function loadListenQuestion() {
            const q = listenWords[Math.floor(Math.random() * listenWords.length)];
            currentListenWord = q.word;

            // 打乱选项
            const shuffled = [...q.options].sort(() => Math.random() - 0.5);

            const container = document.getElementById('listenOptions');
            container.innerHTML = '';

            shuffled.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'listen-option';
                btn.textContent = option;
                btn.onclick = () => checkListenAnswer(option, btn);
                container.appendChild(btn);
            });

            document.getElementById('listenFeedback').textContent = '';
        }

        function playListenWord() {
            if (window.audioManager && currentListenWord) {
                window.audioManager.speakWord(currentListenWord);
            }
        }

        function checkListenAnswer(selected, btn) {
            const buttons = document.querySelectorAll('.listen-option');
            buttons.forEach(b => b.disabled = true);

            if (selected === currentListenWord) {
                btn.classList.add('correct');
                listenScore += 10;
                document.getElementById('listenScore').textContent = listenScore;
                document.getElementById('listenFeedback').textContent = '✅ 正确！';
                document.getElementById('listenFeedback').style.color = 'green';
                if (window.audioManager) window.audioManager.playSuccessSound();
                setTimeout(() => loadListenQuestion(), 1500);
            } else {
                btn.classList.add('wrong');
                document.getElementById('listenFeedback').textContent = `❌ 不对，是 "${currentListenWord}"`;
                document.getElementById('listenFeedback').style.color = 'red';
                if (window.audioManager) window.audioManager.playErrorSound();
                setTimeout(() => loadListenQuestion(), 2000);
            }
        }

        // ========= 单词消消乐游戏 =========
        let matchScore = 0;
        let matchPairs = [];
        let firstCard = null;
        let lockBoard = false;
        let matchWords = [];

        function initMatchGame() {
            // 根据难度调整卡片对数
            const wordMap = {
                easy: [
                    { word: 'cat', emoji: '🐱' },
                    { word: 'dog', emoji: '🐶' },
                    { word: 'fish', emoji: '🐟' },
                    { word: 'bird', emoji: '🐦' }
                ],
                medium: [
                    { word: 'cat', emoji: '🐱' },
                    { word: 'dog', emoji: '🐶' },
                    { word: 'fish', emoji: '🐟' },
                    { word: 'bird', emoji: '🐦' },
                    { word: 'star', emoji: '⭐' },
                    { word: 'moon', emoji: '🌙' }
                ],
                hard: [
                    { word: 'cat', emoji: '🐱' },
                    { word: 'dog', emoji: '🐶' },
                    { word: 'fish', emoji: '🐟' },
                    { word: 'bird', emoji: '🐦' },
                    { word: 'star', emoji: '⭐' },
                    { word: 'moon', emoji: '🌙' },
                    { word: 'apple', emoji: '🍎' },
                    { word: 'book', emoji: '📖' }
                ]
            };
            matchWords = wordMap[currentDifficulty] || wordMap.easy;

            matchScore = 0;
            document.getElementById('matchScore').textContent = 0;
            loadMatchCards();
        }

        function loadMatchCards() {
            const words = matchWords;

            // 创建配对的卡片（单词+图片各一张）
            matchPairs = [];
            words.forEach(item => {
                matchPairs.push({ type: 'word', content: item.word, matchId: item.word });
                matchPairs.push({ type: 'emoji', content: item.emoji, matchId: item.word });
            });

            // 打乱顺序
            matchPairs.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('matchGrid');
            grid.innerHTML = '';
            firstCard = null;
            lockBoard = false;

            matchPairs.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.dataset.index = index;
                card.dataset.matchId = item.matchId;
                card.dataset.type = item.type;

                const front = document.createElement('div');
                front.className = 'match-card-front';
                front.textContent = '?';

                const back = document.createElement('div');
                back.className = 'match-card-back';
                back.textContent = item.type === 'word' ? item.content : item.content;

                card.appendChild(front);
                card.appendChild(back);

                card.onclick = () => flipMatchCard(card);
                grid.appendChild(card);
            });
        }

        function flipMatchCard(card) {
            if (lockBoard) return;
            if (card.classList.contains('flipped')) return;

            card.classList.add('flipped');

            if (!firstCard) {
                firstCard = card;
                return;
            }

            // 检查匹配
            const isMatch = firstCard.dataset.matchId === card.dataset.matchId &&
                            firstCard.dataset.type !== card.dataset.type;

            if (isMatch) {
                // 匹配成功
                matchScore += 20;
                document.getElementById('matchScore').textContent = matchScore;
                document.getElementById('matchFeedback').textContent = '✨ 匹配成功！';
                document.getElementById('matchFeedback').style.color = 'green';

                if (window.audioManager) window.audioManager.playSuccessSound();

                firstCard = null;
                lockBoard = false;

                // 检查是否全部完成
                const allFlipped = document.querySelectorAll('.match-card:not(.flipped)').length === 0;
                if (allFlipped) {
                    setTimeout(() => {
                        alert('🎉 恭喜！全部匹配完成！');
                        loadMatchCards();
                    }, 1000);
                }
            } else {
                // 不匹配
                lockBoard = true;
                document.getElementById('matchFeedback').textContent = '再试试！';
                document.getElementById('matchFeedback').style.color = 'red';

                if (window.audioManager) window.audioManager.playErrorSound();

                setTimeout(() => {
                    firstCard.classList.remove('flipped');
                    card.classList.remove('flipped');
                    firstCard = null;
                    lockBoard = false;
                }, 1000);
            }
        }

        // ========= 句子组合游戏 =========
        let sentenceScore = 0;
        let currentSentence = null;
        let sentenceWords = [];
        let selectedWords = [];
        let sentenceList = [];

        function initSentenceGame() {
            // 根据难度选择句子
            const sentenceMap = {
                easy: [
                    { en: 'I love my family.', zh: '我爱我的家人。' },
                    { en: 'The cat is cute.', zh: '这只猫很可爱。' },
                    { en: 'We go to school.', zh: '我们去上学。' },
                    { en: 'This is a book.', zh: '这是一本书。' }
                ],
                medium: [
                    { en: 'She likes apples.', zh: '她喜欢苹果。' },
                    { en: 'They are happy.', zh: '他们很开心。' },
                    { en: 'I like English.', zh: '我喜欢英语。' },
                    { en: 'He is a teacher.', zh: '他是一名老师。' }
                ],
                hard: [
                    { en: 'He is playing football.', zh: '他正在踢足球。' },
                    { en: 'We are learning English.', zh: '我们正在学英语。' },
                    { en: 'The sun is shining brightly.', zh: '阳光明媚。' },
                    { en: 'Birds can fly high in sky.', zh: '鸟儿能在天空高飞。' }
                ]
            };
            sentenceList = sentenceMap[currentDifficulty] || sentenceMap.easy;

            sentenceScore = 0;
            document.getElementById('sentenceScore').textContent = 0;
            loadSentence();
        }

        function loadSentence() {
            currentSentence = sentenceList[Math.floor(Math.random() * sentenceList.length)];

            // 拆分单词并打乱
            sentenceWords = currentSentence.en.slice(0, -1).split(' ');
            const shuffled = [...sentenceWords].sort(() => Math.random() - 0.5);

            document.getElementById('sentenceTarget').textContent = `中文：${currentSentence.zh}`;
            document.getElementById('sentenceHint').textContent = `提示：${sentenceWords.length}个单词`;

            const container = document.getElementById('sentenceWords');
            container.innerHTML = '';
            selectedWords = [];

            shuffled.forEach((word, index) => {
                const btn = document.createElement('button');
                btn.className = 'sentence-word';
                btn.textContent = word;
                btn.dataset.index = index;
                btn.onclick = () => selectSentenceWord(word, btn);
                container.appendChild(btn);
            });

            document.getElementById('sentenceAnswer').innerHTML = '';
        }

        function selectSentenceWord(word, btn) {
            if (btn.classList.contains('used')) return;

            selectedWords.push(word);
            btn.classList.add('used');
            btn.style.opacity = '0.5';

            const answerDiv = document.getElementById('sentenceAnswer');
            const span = document.createElement('span');
            span.className = 'sentence-answer-word';
            span.textContent = word + ' ';
            answerDiv.appendChild(span);

            if (selectedWords.length === sentenceWords.length) {
                checkSentenceAnswer();
            }
        }

        function checkSentenceAnswer() {
            const userSentence = selectedWords.join(' ') + '.';
            const correctSentence = currentSentence.en;

            if (userSentence === correctSentence) {
                sentenceScore += 20;
                document.getElementById('sentenceScore').textContent = sentenceScore;
                if (window.audioManager) window.audioManager.playSuccessSound();
                if (window.celebration) window.celebration.simpleSuccess(window.innerWidth/2, window.innerHeight/2);
                setTimeout(() => {
                    alert('太棒了！句子正确！');
                    loadSentence();
                }, 500);
            } else {
                if (window.audioManager) window.audioManager.playErrorSound();
                alert('不对哦，再试试！\n正确句子：' + correctSentence);
                resetSentenceGame();
            }
        }

        function resetSentenceGame() {
            selectedWords = [];
            document.getElementById('sentenceAnswer').innerHTML = '';
            document.querySelectorAll('.sentence-word').forEach(btn => {
                btn.classList.remove('used');
                btn.style.opacity = '1';
            });
        }

        // ========= 跟读练习游戏（真实语音识别） =========
        let readScore = 0;
        let currentReadSentence = null;
        let recognition = null;
        let isRecording = false;
        let readSentences = [];

        function initReadGame() {
            // 根据难度选择句子
            const sentenceMap = {
                easy: ['Hello!', 'How are you?', 'I am happy.', 'This is a cat.', 'I like it.'],
                medium: ['I love my family.', 'The cat is cute.', 'We go to school.', 'She likes apples.', 'He is tall.'],
                hard: ['The sun is shining brightly.', 'My mother likes cooking.', 'We are learning English.', 'Birds can fly high in sky.']
            };
            readSentences = sentenceMap[currentDifficulty] || sentenceMap.easy;

            readScore = 0;
            document.getElementById('readScore').textContent = 0;

            // 初始化语音识别
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onresult = function(event) {
                    const userSpeech = event.results[0][0].transcript.trim();
                    handleSpeechResult(userSpeech);
                };

                recognition.onerror = function(event) {
                    console.warn('Speech recognition error:', event.error);
                    if (event.error === 'not-allowed') {
                        document.getElementById('readFeedback').textContent = '请允许麦克风权限，或刷新页面重试';
                    } else {
                        document.getElementById('readFeedback').textContent = '识别失败，请重试';
                    }
                    isRecording = false;
                    document.getElementById('readRecordBtn').textContent = '🎙 开始跟读';
                };

                recognition.onend = function() {
                    isRecording = false;
                    document.getElementById('readRecordBtn').textContent = '🎙 开始跟读';
                };
            } else {
                document.getElementById('readFeedback').textContent = '您的浏览器不支持语音识别，将使用模拟模式';
            }

            loadReadSentence();
        }

        function loadReadSentence() {
            currentReadSentence = readSentences[Math.floor(Math.random() * readSentences.length)];
            document.getElementById('readSentence').textContent = currentReadSentence;
            document.getElementById('readFeedback').textContent = '点击"开始跟读"按钮，然后跟读上面的句子';
            document.getElementById('readFeedback').style.color = 'var(--text-light)';
        }

        function startRecording() {
            if (isRecording) return;

            // 先播放标准发音
            if (window.audioManager) {
                window.audioManager.speakSentence(currentReadSentence);
            }

            setTimeout(() => {
                if (recognition) {
                    // 真实语音识别模式
                    try {
                        recognition.start();
                        isRecording = true;
                        document.getElementById('readFeedback').textContent = '🎙 正在录音...请跟读：' + currentReadSentence;
                        document.getElementById('readFeedback').style.color = 'red';
                        document.getElementById('readRecordBtn').textContent = '🔴 录音中...';
                    } catch (e) {
                        console.warn('Recognition start failed:', e);
                        simulateRecognition();
                    }
                } else {
                    // 模拟模式
                    simulateRecognition();
                }
            }, 1000); // 等发音播放完
        }

        function simulateRecognition() {
            isRecording = true;
            document.getElementById('readFeedback').textContent = '🎙 正在录音...请跟读：' + currentReadSentence;
            document.getElementById('readFeedback').style.color = 'red';
            document.getElementById('readRecordBtn').textContent = '🔴 录音中...';

            setTimeout(() => {
                handleSpeechResult(currentReadSentence); // 模拟成功
            }, 2000);
        }

        function handleSpeechResult(userSpeech) {
            isRecording = false;
            document.getElementById('readRecordBtn').textContent = '🎙 开始跟读';
            document.getElementById('readFeedback').textContent = '⏳️ 评分中...';

            setTimeout(() => {
                // 计算相似度
                const correct = currentReadSentence.toLowerCase().replace(/[?.!]/g, '');
                const user = userSpeech.toLowerCase().replace(/[?.!]/g, '');
                const similarity = calculateSimilarity(correct, user);

                const score = Math.floor(similarity * 40) + 60; // 60-100分
                const stars = score >= 90 ? '⭐⭐⭐' : score >= 70 ? '⭐⭐' : '⭐';

                readScore += Math.floor(score / 10);
                document.getElementById('readScore').textContent = readScore;

                const feedback = `🎤 你说的是："${userSpeech}"<br>得分：${score}分 ${stars}<br>正确句子：${currentReadSentence}`;
                document.getElementById('readFeedback').innerHTML = feedback;
                document.getElementById('readFeedback').style.color = score >= 70 ? 'green' : 'orange';

                if (window.audioManager) {
                    if (score >= 70) {
                        window.audioManager.playSuccessSound();
                    } else {
                        window.audioManager.playErrorSound();
                    }
                }

                if (window.celebration && score >= 90) {
                    window.celebration.simpleSuccess(window.innerWidth/2, window.innerHeight/2);
                }

                setTimeout(() => loadReadSentence(), 3000);
            }, 1000);
        }

        function calculateSimilarity(str1, str2) {
            const words1 = str1.split(' ');
            const words2 = str2.split(' ');
            let matchCount = 0;

            words1.forEach(word => {
                if (words2.includes(word)) matchCount++;
            });

            return matchCount / Math.max(words1.length, words2.length);
        }

        // 更新星星显示
        function updateStarDisplay() {
            const starCount = document.getElementById('starCount');
            if (starCount && window.storage) {
                starCount.textContent = window.storage.data.stars;
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderGames();
            updateStarDisplay();
        });
    </script>

    <script>
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swPath = location.pathname.includes('/pages/') ? '../sw.js' : './sw.js';
            navigator.serviceWorker.register(swPath)
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW failed:', err));
        });
    }
    </script>
