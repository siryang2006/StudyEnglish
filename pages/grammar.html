<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语法学习 - KidsEnglish Fun</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/games.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <style>
        .grammar-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .grammar-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .grammar-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: slideInLeft 0.5s ease-out;
        }
        
        .section-title {
            color: var(--primary-color);
            font-size: 28px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .be-verb-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .be-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .be-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .be-card .form {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .be-card .subject {
            font-size: 20px;
            opacity: 0.9;
        }
        
        .be-card .example {
            margin-top: 15px;
            font-size: 16px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
        }
        
        .tense-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin: 20px 0;
        }
        
        .tense-card {
            background: white;
            border: 3px solid var(--primary-color);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tense-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-color: var(--success-color);
        }
        
        .tense-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .tense-name {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }
        
        .tense-structure {
            background: var(--bg-color);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
        }
        
        .example-sentences {
            margin-top: 15px;
        }
        
        .sentence-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-color);
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .sentence-item:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.02);
        }
        
        .sentence-item .image {
            font-size: 24px;
        }
        
        .rhyme-box {
            background: linear-gradient(135deg, #FFD93D, #FF6B6B);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        
        .exercise-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .exercise-question {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 20px;
            text-align: center;
        }
        
        .exercise-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .exercise-option {
            padding: 15px;
            border: 3px solid var(--primary-color);
            border-radius: 10px;
            background: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .exercise-option:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.05);
        }
        
        .exercise-option.correct {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }
        
        .exercise-option.wrong {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }
        
        @media (max-width: 768px) {
            .exercise-options {
                grid-template-columns: 1fr;
            }
            
            .be-verb-cards, .tense-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <h1>语法学习</h1>
            </div>
            <div class="user-info">
                <div class="stars">
                    <span class="star-icon">⭐</span>
                    <span id="starCount">0</span>
                </div>
            </div>
        </header>

        <main class="main-content grammar-container">
            <button class="back-btn" onclick="navigateTo('../index.html')">
                ← 返回首页
            </button>

            <!-- Be动词学习 -->
            <div class="grammar-section">
                <h2 class="section-title">📝 Be动词学习</h2>
                
                <div class="rhyme-box bounce-in">
                    <span style="font-size: 36px;">🎵</span><br>
                    我用am你用are，is连着他她它<br>
                    单数名词用is，复数名词全用are
                </div>

                <div class="be-verb-cards" id="beVerbCards">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 时态学习 -->
            <div class="grammar-section">
                <h2 class="section-title">⏰ 时态学习</h2>
                
                <div class="tense-cards" id="tenseCards">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 练习区 -->
            <div class="exercise-section">
                <h2 class="section-title">✏️ 小练习</h2>
                
                <div class="exercise-question" id="exerciseQuestion">
                    点击开始练习
                </div>
                
                <div class="exercise-options" id="exerciseOptions">
                    <!-- 动态生成 -->
                </div>
                
                <div id="exerciseResult" style="text-align: center; margin-top: 20px; font-size: 18px;"></div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button class="tab-btn" onclick="startExercise()">开始练习</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let currentExerciseIndex = 0;
        let exerciseList = [];

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            renderBeVerbs();
            renderTenses();
            updateStarDisplay();
        });

        // 渲染Be动词卡片
        function renderBeVerbs() {
            const container = document.getElementById('beVerbCards');
            if (!container) return;
            
            beVerbData.forms.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'be-card ripple';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="form">${item.form}</div>
                    <div class="subject">${item.subject}</div>
                    <div class="example">${item.example}</div>
                    <div style="margin-top: 10px; font-size: 14px;">${item.chinese}</div>
                `;
                card.onclick = () => {
                    audioManager.speak(item.example);
                    storage.addStars(2);
                    updateStarDisplay();
                };
                container.appendChild(card);
            });
        }

        // 渲染时态卡片
        function renderTenses() {
            const container = document.getElementById('tenseCards');
            if (!container) return;

            Object.values(tenseData).forEach((tense, index) => {
                const card = document.createElement('div');
                card.className = 'tense-card';
                card.style.animationDelay = `${index * 0.15}s`;
                
                const examplesHTML = tense.examples.map(ex => `
                    <div class="sentence-item" onclick="audioManager.speakSentence('${ex.sentence}')">
                        <span class="image">${ex.image}</span>
                        <div>
                            <div><strong>${ex.sentence}</strong></div>
                            <div style="font-size: 14px; color: #666;">${ex.chinese}</div>
                        </div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="tense-icon">${tense.icon}</div>
                    <div class="tense-name">${tense.name}</div>
                    <div style="color: #666; margin: 10px 0;">${tense.description}</div>
                    <div class="tense-structure">${tense.structure}</div>
                    <div class="example-sentences">${examplesHTML}</div>
                `;
                container.appendChild(card);
            });
        }

        // 开始练习
        function startExercise() {
            exerciseList = [...beVerbData.exercises].sort(() => Math.random() - 0.5);
            currentExerciseIndex = 0;
            showExercise();
        }

        // 显示题目
        function showExercise() {
            if (currentExerciseIndex >= exerciseList.length) {
                document.getElementById('exerciseQuestion').textContent = '🎉 练习完成！';
                document.getElementById('exerciseOptions').innerHTML = '';
                document.getElementById('exerciseResult').innerHTML = '<p style="color:green; font-size: 24px;">太棒了！你已完成所有练习！</p>';
                audioManager.playSuccessSound();
                storage.addStars(20);
                updateStarDisplay();
                return;
            }

            const exercise = exerciseList[currentExerciseIndex];
            document.getElementById('exerciseQuestion').textContent = exercise.question;
            
            const optionsHTML = exercise.options.map(opt => `
                <div class="exercise-option" onclick="checkExercise('${opt}', '${exercise.answer}')">
                    ${opt}
                </div>
            `).join('');
            document.getElementById('exerciseOptions').innerHTML = optionsHTML;
            document.getElementById('exerciseResult').innerHTML = '';
        }

        // 检查答案
        function checkExercise(selected, correct) {
            const options = document.querySelectorAll('.exercise-option');
            options.forEach(opt => {
                opt.classList.remove('correct', 'wrong');
                if (opt.textContent === correct) {
                    opt.classList.add('correct');
                } else if (opt.textContent === selected && selected !== correct) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
            });

            const resultEl = document.getElementById('exerciseResult');
            if (selected === correct) {
                resultEl.innerHTML = '<p style="color:green; font-size: 20px;">✓ 正确！真厉害！</p>';
                audioManager.playSuccessSound();
                storage.addStars(5);
            } else {
                resultEl.innerHTML = `<p style="color:red; font-size: 20px;">✗ 正确答案是: ${correct}</p>`;
                audioManager.playErrorSound();
            }

            updateStarDisplay();

            // 下一题
            setTimeout(() => {
                currentExerciseIndex++;
                showExercise();
            }, 1500);
        }

        // 更新星星显示
        function updateStarDisplay() {
            const starCount = document.getElementById('starCount');
            if (starCount && storage) {
                starCount.textContent = storage.data.stars;
            }
        }
    </script>
</body>
</html>
