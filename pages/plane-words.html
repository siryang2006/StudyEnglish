<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战单词 - KidsEnglish Fun</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/celebration.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <style>
        .game-container { padding: 10px; max-width: 500px; margin: 0 auto; }
        .game-hud {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: rgba(0,0,0,0.7); border-radius: 12px;
            color: white; font-weight: bold; margin-bottom: 10px;
        }
        .hud-item { text-align: center; }
        .hud-item .val { font-size: 22px; }
        .hud-item .lbl { font-size: 11px; opacity: 0.8; }
        .game-area {
            position: relative; width: 100%; height: 500px;
            background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 40%, #2d1b69 100%);
            border-radius: 15px; overflow: hidden; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }
        @media (max-width: 480px) {
            .game-area { height: 400px; }
            .game-hud { padding: 8px 10px; }
            .hud-item .val { font-size: 18px; }
            .plane { font-size: 32px; bottom: 20px; }
            .word-enemy { font-size: 15px; padding: 6px 12px; }
            .question-bar .q-emoji { font-size: 22px; }
            .question-bar .q-text { font-size: 14px; }
        }
        @media (min-width: 768px) {
            .game-area { height: 600px; }
        }
        .star-bg {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; opacity: 0.6;
        }
        .plane {
            position: absolute; bottom: 30px; font-size: 40px;
            transition: left 0.1s ease-out; z-index: 10;
            filter: drop-shadow(0 0 8px rgba(100,200,255,0.6));
        }
        .plane-trail {
            position: absolute; width: 4px; border-radius: 2px;
            background: linear-gradient(to top, transparent, rgba(100,200,255,0.4));
            z-index: 5;
        }
        .word-enemy {
            position: absolute; padding: 8px 16px;
            border-radius: 12px; font-size: 18px; font-weight: bold;
            color: white; text-align: center; z-index: 8;
            transition: top 0.05s linear;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .word-enemy.correct {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            box-shadow: 0 0 15px rgba(67,233,123,0.5);
        }
        .word-enemy.wrong {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            box-shadow: 0 0 15px rgba(255,107,107,0.5);
        }
        .word-enemy.bonus {
            background: linear-gradient(135deg, #FFD93D, #ff9a56);
            box-shadow: 0 0 15px rgba(255,217,61,0.5);
        }
        .bullet {
            position: absolute; width: 4px; height: 12px;
            background: linear-gradient(to top, #4ECDC4, #45B7D1);
            border-radius: 2px; z-index: 9;
            box-shadow: 0 0 6px rgba(69,183,209,0.8);
        }
        .explosion {
            position: absolute; font-size: 30px; z-index: 20;
            animation: explode 0.6s ease-out forwards; pointer-events: none;
        }
        @keyframes explode {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .score-popup {
            position: absolute; font-size: 18px; font-weight: bold;
            z-index: 20; pointer-events: none; color: #FFD93D;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
        }
        .question-bar {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(5px);
            border-radius: 10px; padding: 10px 15px; margin: 8px;
            position: absolute; top: 0; left: 0; right: 0; z-index: 15;
            text-align: center; color: white;
        }
        .question-bar .q-emoji { font-size: 28px; }
        .question-bar .q-text { font-size: 16px; margin-top: 3px; }
        .game-over-panel {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 30;
            background: rgba(0,0,0,0.9); border-radius: 20px; padding: 30px;
            text-align: center; color: white; min-width: 280px;
        }
        .game-over-panel h2 { font-size: 28px; margin-bottom: 15px; }
        .game-over-panel .final-score { font-size: 48px; font-weight: bold; color: #FFD93D; }
        .restart-btn {
            margin-top: 20px; padding: 14px 40px; border: none; border-radius: 25px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white; font-size: 18px; font-weight: bold; cursor: pointer;
        }
        .start-panel {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 30;
            text-align: center; color: white;
        }
        .start-panel h2 { font-size: 26px; margin-bottom: 10px; }
        .start-panel p { font-size: 15px; opacity: 0.8; margin-bottom: 5px; }
        .start-btn {
            margin-top: 20px; padding: 16px 50px; border: none; border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; font-size: 20px; font-weight: bold; cursor: pointer;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .lives { display: flex; gap: 3px; }
        .lives span { font-size: 18px; }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">✈️</span>
                <h1>飞机大战单词</h1>
            </div>
            <div class="user-info">
                <div class="stars">
                    <span class="star-icon">⭐</span>
                    <span id="starCount">0</span>
                </div>
            </div>
        </header>

        <main class="main-content game-container">
            <button class="back-btn" onclick="navigateTo('../index.html')">← 返回首页</button>

            <div class="game-hud">
                <div class="hud-item"><div class="val" id="hudScore">0</div><div class="lbl">分数</div></div>
                <div class="hud-item"><div class="val lives" id="hudLives">❤️❤️❤️</div><div class="lbl">生命</div></div>
                <div class="hud-item"><div class="val" id="hudCombo">0</div><div class="lbl">连击</div></div>
            </div>

            <div class="game-area" id="gameArea">
                <div class="question-bar" id="questionBar">
                    <div class="q-emoji" id="qEmoji">🐱</div>
                    <div class="q-text" id="qText">射击正确的单词！</div>
                </div>

                <div class="plane" id="plane">🛩️</div>

                <div class="start-panel" id="startPanel">
                    <h2>✈️ 飞机大战单词</h2>
                    <p>左右滑动控制飞机</p>
                    <p>射击正确的英文单词</p>
                    <p>击中错误单词会扣生命！</p>
                    <button class="start-btn" onclick="startGame()">开始游戏</button>
                </div>

                <div class="game-over-panel" id="gameOverPanel">
                    <h2>游戏结束</h2>
                    <div class="final-score" id="finalScore">0</div>
                    <p>获得星星: <span id="finalStars">0</span> ⭐</p>
                    <button class="restart-btn" onclick="startGame()">再来一局</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/celebration.js"></script>
    <script src="../js/gameFx.js"></script>
    <script src="../js/app.js"></script>
    <script>
        var area, plane, planeX, areaW, areaH;
        var bullets = [], enemies = [], animId = null;
        var score = 0, lives = 3, combo = 0, gameRunning = false;
        var currentQuestion = null, allWords = [], lastShot = 0;
        var touchStartX = 0, planeStartX = 0;
        var spawnTimer = 0, spawnInterval = 90, difficulty = 1;
        var frameCount = 0;

        function initWordPool() {
            allWords = [];
            Object.keys(wordCategories).forEach(function(cat) {
                wordCategories[cat].words.forEach(function(w) { allWords.push(w); });
            });
        }

        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
            }
            return arr;
        }

        function pickQuestion() {
            var w = allWords[Math.floor(Math.random() * allWords.length)];
            currentQuestion = w;
            document.getElementById('qEmoji').textContent = w.image;
            document.getElementById('qText').textContent = '射击: ' + w.chinese;
        }

        function createStars() {
            for (var i = 0; i < 40; i++) {
                var s = document.createElement('div');
                s.className = 'star-bg';
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.opacity = 0.3 + Math.random() * 0.5;
                s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
                area.appendChild(s);
            }
        }

        function startGame() {
            area = document.getElementById('gameArea');
            plane = document.getElementById('plane');
            areaW = area.offsetWidth;
            areaH = area.offsetHeight;
            planeX = areaW / 2 - 20;

            document.getElementById('startPanel').style.display = 'none';
            document.getElementById('gameOverPanel').style.display = 'none';

            area.querySelectorAll('.word-enemy, .bullet, .explosion, .score-popup, .star-bg, .plane-trail').forEach(function(e) { e.remove(); });
            bullets = []; enemies = [];
            score = 0; lives = 3; combo = 0; frameCount = 0;
            spawnInterval = 90; difficulty = 1;
            updateHUD();
            createStars();

            plane.style.left = planeX + 'px';
            gameRunning = true;
            pickQuestion();

            if (animId) cancelAnimationFrame(animId);
            gameLoop();
        }

        function updateHUD() {
            document.getElementById('hudScore').textContent = score;
            document.getElementById('hudCombo').textContent = combo;
            var h = '';
            for (var i = 0; i < lives; i++) h += '❤️';
            for (var i = lives; i < 3; i++) h += '🖤';
            document.getElementById('hudLives').innerHTML = h;
        }

        function shoot() {
            var now = Date.now();
            if (now - lastShot < 250) return;
            lastShot = now;
            var b = document.createElement('div');
            b.className = 'bullet';
            b.style.left = (planeX + 18) + 'px';
            b.style.top = (areaH - 80) + 'px';
            area.appendChild(b);
            bullets.push({ el: b, x: planeX + 18, y: areaH - 80 });
            if (window.audioManager) audioManager.playClickSound();
        }

        function spawnEnemy() {
            if (!currentQuestion) return;
            var isCorrect = Math.random() < 0.35;
            var w;
            if (isCorrect) {
                w = currentQuestion;
            } else {
                var others = allWords.filter(function(x) { return x.word !== currentQuestion.word; });
                w = others[Math.floor(Math.random() * others.length)];
            }

            var el = document.createElement('div');
            el.className = 'word-enemy ' + (isCorrect ? 'correct' : 'wrong');
            el.textContent = w.word;
            var x = 20 + Math.random() * (areaW - 120);
            el.style.left = x + 'px';
            el.style.top = '-40px';
            area.appendChild(el);

            var speed = 0.8 + difficulty * 0.15 + Math.random() * 0.3;
            enemies.push({ el: el, x: x, y: -40, speed: speed, word: w, isCorrect: isCorrect });
        }

        function gameLoop() {
            if (!gameRunning) return;
            frameCount++;

            // auto shoot
            if (frameCount % 15 === 0) shoot();

            // spawn enemies
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnTimer = 0;
                spawnEnemy();
            }

            // difficulty ramp
            if (frameCount % 600 === 0) {
                difficulty++;
                spawnInterval = Math.max(40, 90 - difficulty * 5);
            }

            // move bullets
            for (var i = bullets.length - 1; i >= 0; i--) {
                var b = bullets[i];
                b.y -= 6;
                b.el.style.top = b.y + 'px';
                if (b.y < -15) { b.el.remove(); bullets.splice(i, 1); }
            }

            // move enemies
            for (var i = enemies.length - 1; i >= 0; i--) {
                var e = enemies[i];
                e.y += e.speed;
                e.el.style.top = e.y + 'px';

                if (e.y > areaH) {
                    if (e.isCorrect) {
                        lives--;
                        combo = 0;
                        updateHUD();
                        if (lives <= 0) { endGame(); return; }
                    }
                    e.el.remove(); enemies.splice(i, 1);
                    continue;
                }

                // collision with bullets
                for (var j = bullets.length - 1; j >= 0; j--) {
                    var b = bullets[j];
                    var ew = e.el.offsetWidth, eh = e.el.offsetHeight;
                    if (b.x > e.x - 5 && b.x < e.x + ew + 5 && b.y > e.y && b.y < e.y + eh + 5) {
                        b.el.remove(); bullets.splice(j, 1);
                        hitEnemy(e, i);
                        break;
                    }
                }
            }

            animId = requestAnimationFrame(gameLoop);
        }

        function hitEnemy(e, idx) {
            var rect = area.getBoundingClientRect();
            var screenX = rect.left + e.x;
            var screenY = rect.top + e.y;
            if (e.isCorrect) {
                combo++;
                var pts = 10 + combo * 2;
                score += pts;
                showExplosion(e.x, e.y, '💥');
                showScorePopup(e.x, e.y, '+' + pts);
                if (window.audioManager) audioManager.playSuccessSound();
                if (window.gameFx) gameFx.comboEffect(combo, screenX, screenY);
                if (combo >= 5 && window.celebration) celebration.simpleSuccess(window.innerWidth/2, window.innerHeight/2);
                pickQuestion();
            } else {
                lives--;
                combo = 0;
                showExplosion(e.x, e.y, '💔');
                showScorePopup(e.x, e.y, '错误!');
                if (window.audioManager) audioManager.playErrorSound();
                if (window.gameFx) gameFx.shake(12, 300);
                if (lives <= 0) { e.el.remove(); enemies.splice(idx, 1); updateHUD(); endGame(); return; }
            }
            e.el.remove(); enemies.splice(idx, 1);
            updateHUD();
        }

        function showExplosion(x, y, emoji) {
            var el = document.createElement('div');
            el.className = 'explosion';
            el.textContent = emoji;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            area.appendChild(el);
            setTimeout(function() { el.remove(); }, 600);
        }

        function showScorePopup(x, y, text) {
            var el = document.createElement('div');
            el.className = 'score-popup';
            el.textContent = text;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            area.appendChild(el);
            setTimeout(function() { el.remove(); }, 1000);
        }

        function endGame() {
            gameRunning = false;
            if (animId) cancelAnimationFrame(animId);
            if (window.gameFx) gameFx.superImpact(window.innerWidth/2, window.innerHeight/2);
            var stars = Math.floor(score / 10);
            if (window.storage) storage.addStars(stars);
            updateStarDisplay();
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalStars').textContent = stars;
            document.getElementById('gameOverPanel').style.display = 'block';
        }

        // controls
        document.addEventListener('DOMContentLoaded', function() {
            area = document.getElementById('gameArea');
            updateStarDisplay();
            initWordPool();

            area.addEventListener('touchstart', function(ev) {
                var t = ev.touches[0];
                touchStartX = t.clientX;
                planeStartX = planeX;
            }, { passive: true });

            area.addEventListener('touchmove', function(ev) {
                if (!gameRunning) return;
                var t = ev.touches[0];
                var dx = t.clientX - touchStartX;
                planeX = Math.max(0, Math.min(areaW - 40, planeStartX + dx));
                plane.style.left = planeX + 'px';
            }, { passive: true });

            area.addEventListener('mousemove', function(ev) {
                if (!gameRunning) return;
                var rect = area.getBoundingClientRect();
                planeX = Math.max(0, Math.min(areaW - 40, ev.clientX - rect.left - 20));
                plane.style.left = planeX + 'px';
            });

            area.addEventListener('click', function() {
                if (gameRunning) shoot();
            });
        });

        function updateStarDisplay() {
            var el = document.getElementById('starCount');
            if (el && storage) el.textContent = storage.data.stars;
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            var swPath = location.pathname.includes('/pages/') ? '../sw.js' : './sw.js';
            navigator.serviceWorker.register(swPath).catch(function() {});
        });
    }
    </script>
</body>
</html>
