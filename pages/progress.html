<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习进度 - KidsEnglish Fun</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <style>
        .progress-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        
        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        
        .stat-number {
            font-size: 42px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 16px;
            color: var(--text-light);
        }
        
        .progress-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .progress-section h3 {
            color: var(--text-dark);
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-bar-container {
            margin: 20px 0;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-dark);
            font-weight: bold;
        }
        
        .progress-bar {
            height: 25px;
            background: #eee;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--success-color));
            border-radius: 15px;
            transition: width 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .badges-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .badge-item {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: var(--bg-color);
            transition: all 0.3s ease;
        }
        
        .badge-item.unlocked {
            background: linear-gradient(135deg, #FFD93D, #FF6B6B);
            color: white;
            animation: bounceIn 0.5s ease-out;
        }
        
        .badge-item.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }
        
        .badge-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        
        .badge-name {
            font-size: 14px;
            font-weight: bold;
        }
        
        .streak-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .streak-number {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .reset-btn {
            margin-top: 30px;
            padding: 12px 25px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .reset-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .badges-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">📊</span>
                <h1>学习进度</h1>
            </div>
            <div class="user-info">
                <div class="stars">
                    <span class="star-icon">⭐</span>
                    <span id="starCount">0</span>
                </div>
            </div>
        </header>

        <main class="main-content progress-container">
            <button class="back-btn" onclick="navigateTo('../index.html')">
                ← 返回首页
            </button>

            <!-- 连续学习天数 -->
            <div class="streak-info">
                <h2>🔥 连续学习</h2>
                <div class="streak-number" id="streakNumber">0</div>
                <p>天</p>
            </div>

            <!-- 统计数据 -->
            <div class="stats-grid">
                <div class="stat-card bounce-in">
                    <span class="stat-icon">⭐</span>
                    <div class="stat-number" id="totalStars">0</div>
                    <div class="stat-label">总星星</div>
                </div>
                <div class="stat-card bounce-in" style="animation-delay: 0.1s;">
                    <span class="stat-icon">🔤</span>
                    <div class="stat-number" id="lettersLearned">0</div>
                    <div class="stat-label">已学字母</div>
                </div>
                <div class="stat-card bounce-in" style="animation-delay: 0.2s;">
                    <span class="stat-icon">🎵</span>
                    <div class="stat-number" id="phoneticsLearned">0</div>
                    <div class="stat-label">已学音标</div>
                </div>
                <div class="stat-card bounce-in" style="animation-delay: 0.3s;">
                    <span class="stat-icon">📚</span>
                    <div class="stat-number" id="wordsLearned">0</div>
                    <div class="stat-label">已学单词</div>
                </div>
            </div>

            <!-- 学习进度 -->
            <div class="progress-section">
                <h3>📈 学习进度</h3>
                
                <div class="progress-bar-container">
                    <div class="progress-label">
                        <span>字母学习</span>
                        <span id="letterProgress">0/26</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="letterBar" style="width: 0%;">0%</div>
                    </div>
                </div>

                <div class="progress-bar-container">
                    <div class="progress-label">
                        <span>音标学习</span>
                        <span id="phoneticProgress">0/48</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="phoneticBar" style="width: 0%;">0%</div>
                    </div>
                </div>

                <div class="progress-bar-container">
                    <div class="progress-label">
                        <span>单词学习</span>
                        <span id="wordProgress">0/24</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="wordBar" style="width: 0%;">0%</div>
                    </div>
                </div>
            </div>

            <!-- 徽章 -->
            <div class="badges-section">
                <h3>🏆 徽章收集</h3>
                <div class="badges-grid" id="badgesGrid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 重置按钮 -->
            <div style="text-align: center;">
                <button class="reset-btn" onclick="resetProgress()">🔄 重置所有进度</button>
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script>
        const badges = [
            { id: 'first_letter', name: '字母入门', icon: '🔤', desc: '学习第一个字母' },
            { id: 'half_letters', name: '字母达人', icon: '🌟', desc: '学完13个字母' },
            { id: 'all_letters', name: '字母大师', icon: '🎓', desc: '学完所有字母' },
            { id: 'first_phonetic', name: '音标入门', icon: '🎵', desc: '学习第一个音标' },
            { id: 'half_phonetics', name: '音标达人', icon: '🎶', desc: '学完24个音标' },
            { id: 'all_phonetics', name: '音标大师', icon: '🎼', desc: '学完所有音标' },
            { id: 'first_word', name: '单词入门', icon: '📖', desc: '学习第一个单词' },
            { id: 'ten_words', name: '单词达人', icon: '📚', desc: '学习10个单词' },
            { id: 'all_words', name: '词汇大师', icon: '📕', desc: '学习所有单词' },
            { id: 'streak_3', name: '坚持3天', icon: '🔥', desc: '连续学习3天' },
            { id: 'streak_7', name: '坚持一周', icon: '⚡', desc: '连续学习7天' },
            { id: 'hundred_stars', name: '百星达人', icon: '⭐', desc: '获得100颗星星' }
        ];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadProgress();
            updateStarDisplay();
        });

        // 加载进度
        function loadProgress() {
            const stats = storage.getStats();
            
            // 更新统计
            document.getElementById('totalStars').textContent = stats.stars;
            document.getElementById('lettersLearned').textContent = stats.lettersLearned;
            document.getElementById('phoneticsLearned').textContent = stats.phoneticsLearned;
            document.getElementById('wordsLearned').textContent = stats.wordsLearned;
            document.getElementById('streakNumber').textContent = stats.streak;

            // 更新进度条
            const letterPercent = Math.round((stats.lettersLearned / 26) * 100);
            const phoneticPercent = Math.round((stats.phoneticsLearned / 48) * 100);
            const wordPercent = Math.round((stats.wordsLearned / 24) * 100);

            document.getElementById('letterProgress').textContent = `${stats.lettersLearned}/26`;
            document.getElementById('phoneticProgress').textContent = `${stats.phoneticsLearned}/48`;
            document.getElementById('wordProgress').textContent = `${stats.wordsLearned}/24`;

            animateProgressBar('letterBar', letterPercent);
            animateProgressBar('phoneticBar', phoneticPercent);
            animateProgressBar('wordBar', wordPercent);

            // 渲染徽章
            renderBadges();
        }

        // 动画进度条
        function animateProgressBar(barId, percent) {
            const bar = document.getElementById(barId);
            setTimeout(() => {
                bar.style.width = percent + '%';
                bar.textContent = percent + '%';
            }, 300);
        }

        // 渲染徽章
        function renderBadges() {
            const grid = document.getElementById('badgesGrid');
            if (!grid) return;

            grid.innerHTML = '';

            badges.forEach(badge => {
                const isUnlocked = storage.data.badges.includes(badge.id);
                const isLocked = !isUnlocked;

                const item = document.createElement('div');
                item.className = `badge-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                item.innerHTML = `
                    <span class="badge-icon">${badge.icon}</span>
                    <div class="badge-name">${badge.name}</div>
                    <div style="font-size: 12px; margin-top: 5px; opacity: 0.8;">${badge.desc}</div>
                `;
                grid.appendChild(item);
            });
        }

        // 重置进度
        function resetProgress() {
            if (confirm('确定要重置所有学习进度吗？此操作不可恢复！')) {
                storage.reset();
                loadProgress();
                updateStarDisplay();
                alert('进度已重置！');
            }
        }

        // 更新星星显示
        function updateStarDisplay() {
            const starCount = document.getElementById('starCount');
            if (starCount && storage) {
                starCount.textContent = storage.data.stars;
            }
        }
    </script>

    <script>
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swPath = location.pathname.includes('/pages/') ? '../sw.js' : './sw.js';
            navigator.serviceWorker.register(swPath)
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW failed:', err));
        });
    }
    </script>

</body>
</html>
