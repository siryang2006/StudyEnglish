<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词卡片 - KidsEnglish Fun</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/games.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <style>
        .words-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .flashcard-container {
            perspective: 1000px;
            width: 320px;
            height: 420px;
            margin: 30px auto;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .word-image {
            font-size: 100px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .word-text {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .word-phonetic {
            font-size: 20px;
            opacity: 0.9;
            font-family: 'Times New Roman', serif;
        }

        .word-chinese {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .word-example {
            font-size: 18px;
            opacity: 0.9;
            text-align: center;
            line-height: 1.5;
        }

        .card-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .control-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-speak {
            background: var(--success-color);
            color: white;
        }

        .btn-next {
            background: var(--primary-color);
            color: white;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--primary-color);
            transform: scale(1.3);
        }

        .category-title {
            text-align: center;
            font-size: 24px;
            color: var(--text-dark);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <h1>单词卡片</h1>
            </div>
            <div class="user-info">
                <div class="stars">
                    <span class="star-icon">⭐</span>
                    <span id="starCount">0</span>
                </div>
            </div>
        </header>

        <main class="main-content words-container">
            <button class="back-btn" onclick="navigateTo('../index.html')">
                ← 返回首页
            </button>

            <div class="category-tabs" id="categoryTabs">
                <!-- 动态生成 -->
            </div>

            <div class="category-title" id="categoryTitle">动物</div>

            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="card-face card-front">
                        <div class="word-image" id="wordImage">🐱</div>
                        <div class="word-text" id="wordText">cat</div>
                        <div class="word-phonetic" id="wordPhonetic">/kæt/</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="word-chinese" id="wordChinese">猫</div>
                        <div class="word-example" id="wordExample">This is a cat.<br>这是一只猫。</div>
                    </div>
                </div>
            </div>

            <div class="card-controls">
                <button class="control-btn btn-speak" onclick="speakWord()">🔊 发音</button>
                <button class="control-btn btn-next" onclick="nextWord()">下一个 ➡️</button>
            </div>

            <div class="progress-dots" id="progressDots">
                <!-- 动态生成 -->
            </div>
        </main>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let currentCategory = 'animals';
        let currentIndex = 0;
        let isFlipped = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderCategoryTabs();
            loadWord();
            updateStarDisplay();
        });

        // 渲染分类标签
        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            Object.keys(wordCategories).forEach(key => {
                const category = wordCategories[key];
                const tab = document.createElement('button');
                tab.className = 'tab-btn' + (key === currentCategory ? ' active' : '');
                tab.innerHTML = `${category.icon} ${category.name}`;
                tab.onclick = () => switchCategory(key);
                container.appendChild(tab);
            });
        }

        // 切换分类
        function switchCategory(category) {
            currentCategory = category;
            currentIndex = 0;
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            
            // 更新标签状态
            document.querySelectorAll('.tab-btn').forEach((tab, index) => {
                const keys = Object.keys(wordCategories);
                tab.classList.toggle('active', keys[index] === category);
            });

            loadWord();
        }

        // 加载单词
        function loadWord() {
            const category = wordCategories[currentCategory];
            const word = category.words[currentIndex];

            document.getElementById('categoryTitle').textContent = category.name;
            document.getElementById('wordImage').textContent = word.image;
            document.getElementById('wordText').textContent = word.word;
            document.getElementById('wordPhonetic').textContent = word.phonetic;
            document.getElementById('wordChinese').textContent = word.chinese;
            document.getElementById('wordExample').innerHTML = 
                `This is a ${word.word}.<br>这是一个${word.chinese}。`;

            // 更新进度点
            updateProgressDots();

            // 自动发音
            setTimeout(() => {
                audioManager.speakWord(word.word);
            }, 300);
        }

        // 翻转卡片
        function flipCard() {
            const card = document.getElementById('flashcard');
            isFlipped = !isFlipped;
            card.classList.toggle('flipped');
            audioManager.playClickSound();
        }

        // 下一个单词
        function nextWord() {
            const category = wordCategories[currentCategory];
            currentIndex = (currentIndex + 1) % category.words.length;
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            loadWord();
            
            // 添加星星
            storage.addLearnedWord(currentCategory + '_' + currentIndex);
            storage.addStars(2);
            updateStarDisplay();
        }

        // 发音
        function speakWord() {
            const category = wordCategories[currentCategory];
            const word = category.words[currentIndex];
            audioManager.speakWord(word.word);
        }

        // 更新进度点
        function updateProgressDots() {
            const category = wordCategories[currentCategory];
            const container = document.getElementById('progressDots');
            container.innerHTML = '';

            category.words.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (index === currentIndex ? ' active' : '');
                container.appendChild(dot);
            });
        }

        // 更新星星显示
        function updateStarDisplay() {
            const starCount = document.getElementById('starCount');
            if (starCount && storage) {
                starCount.textContent = storage.data.stars;
            }
        }
    </script>
</body>
</html>
